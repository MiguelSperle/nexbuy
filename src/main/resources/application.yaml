spring:
  application:
    name: nexbuy

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    schemas: public
    default-schema: public

  api:
    security:
      token:
        secret: ${JWT_SECRET}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  rabbitmq:
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3000
          multiplier: 2
          max-interval: 12000
          max-retries: 3

  freight:
    api:
      url: ${FREIGHT_QUOTE_URL}
      token: ${FREIGHT_QUOTE_TOKEN}
      email: ${FREIGHT_QUOTE_EMAIL}
      cep:
        from: ${FREIGHT_QUOTE_FROM}

  stripe:
    secret:
      key: ${STRIPE_SECRET_KEY}
    webhook:
      secret:
        key: ${STRIPE_WEBHOOK_SECRET_KEY}